// ── Regional Detail System ──
const REGIONAL_SIZE = 512;
const REGIONAL_SCALE = 1.0;       // km per cell
const PLANETARY_CELL_KM = 156;    // km per planetary cell
const CELLS_PER_PLANETARY = PLANETARY_CELL_KM / REGIONAL_SCALE;

const regionalCanvas = document.getElementById('regionalCanvas');
const regionalCtx = regionalCanvas.getContext('2d');
const regionalPanel = document.getElementById('regionalPanel');
const regionalPlaceholder = document.getElementById('regionalPlaceholder');
const regionalActiveEl = document.getElementById('regionalActive');
const regionLabel = document.getElementById('regionLabel');
const regionalOverlaySelect = document.getElementById('regionalOverlaySelect');
const closeRegionalBtn = document.getElementById('closeRegionalBtn');
const regionalHeader = document.getElementById('regionalHeader');
const regionalCanvasWrap = document.getElementById('regionalCanvasWrap');

let selectedRegion = null;        // { cx, cy }
let regionalCells = null;         // 512x512 array
let regionalSubPeaks = [];        // sub-peak data for volcanic islands
let activeControl = 'planetary';  // 'planetary' or 'regional'

// Accessor: get planetary cell from the flat 1D cells array, treating it as 2D
function getPlanetaryCell(x, y) {
  const wx = ((Math.floor(x) % W) + W) % W;
  const wy = Math.max(0, Math.min(H - 1, Math.floor(y)));
  return cells[wy * W + wx];
}

// Seeded RNG for sub-peak generation (deterministic per-hotspot)
function seededRNG(seed) {
  return mulberry32(Math.abs(Math.floor(seed * 13371 + 7919)));
}

// Generate sub-peaks for volcanic hotspots near the regional view
function generateSubPeaks(centerCX, centerCY, seed) {
  const subPeaks = [];
  if (!hotspots) return subPeaks;

  for (const hs of hotspots) {
    // Check if hotspot is within or near the regional bounds (in planetary cells)
    let dx = Math.abs(hs.x - centerCX);
    if (dx > W / 2) dx = W - dx;
    const dy = Math.abs(hs.y - centerCY);
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 8) continue;  // skip distant hotspots (8 planetary cells ~1250 km)

    // Generate 2-5 sub-peaks around the hotspot center
    const rng = seededRNG(seed + hs.x * 137 + hs.y * 311);
    const numPeaks = params.subPeakMin + Math.floor(rng() * (params.subPeakMax - params.subPeakMin + 1));

    for (let i = 0; i < numPeaks; i++) {
      // Offset from hotspot center: 0-subPeakSpread km in random direction
      const angle = rng() * Math.PI * 2;
      const offsetDist = rng() * params.subPeakSpread;  // km
      const peakX = hs.x + (Math.cos(angle) * offsetDist) / PLANETARY_CELL_KM;
      const peakY = hs.y + (Math.sin(angle) * offsetDist) / PLANETARY_CELL_KM;

      // Each sub-peak has its own height and radius
      const height = hs.intensity * (0.4 + rng() * 0.6);  // 40-100% of parent
      const radius = 30 + rng() * 50;  // 30-80 km radius in regional cells

      subPeaks.push({
        // Store in regional cell coordinates for fast lookup
        rx: (peakX - centerCX) * CELLS_PER_PLANETARY + REGIONAL_SIZE / 2,
        ry: (peakY - centerCY) * CELLS_PER_PLANETARY + REGIONAL_SIZE / 2,
        height,
        radius,
      });
    }
  }

  return subPeaks;
}

// Bilinear interpolation helper
function bilerp(v00, v10, v01, v11, fx, fy) {
  return v00 * (1 - fx) * (1 - fy) + v10 * fx * (1 - fy) + v01 * (1 - fx) * fy + v11 * fx * fy;
}

function bilinearInterpolate(px, py) {
  const x0 = Math.floor(px), x1 = (x0 + 1) % W;
  const y0 = Math.floor(py), y1 = Math.min(H - 1, y0 + 1);
  const fx = px - x0, fy = py - y0;

  const c00 = getPlanetaryCell(x0, y0);
  const c10 = getPlanetaryCell(x1, y0);
  const c01 = getPlanetaryCell(x0, y1);
  const c11 = getPlanetaryCell(x1, y1);

  return {
    elevation:   bilerp(c00.elevation, c10.elevation, c01.elevation, c11.elevation, fx, fy),
    minerals: {
      iron:      bilerp(c00.minerals.iron, c10.minerals.iron, c01.minerals.iron, c11.minerals.iron, fx, fy),
      copper:    bilerp(c00.minerals.copper, c10.minerals.copper, c01.minerals.copper, c11.minerals.copper, fx, fy),
      manganese: bilerp(c00.minerals.manganese, c10.minerals.manganese, c01.minerals.manganese, c11.minerals.manganese, fx, fy),
    },
    moisture:    bilerp(c00.moisture, c10.moisture, c01.moisture, c11.moisture, fx, fy),
    temperature: bilerp(c00.temperature, c10.temperature, c01.temperature, c11.temperature, fx, fy),
    volcanism:   bilerp(c00.volcanism, c10.volcanism, c01.volcanism, c11.volcanism, fx, fy),
  };
}

function addRegionalDetail(interp, rx, ry, px, py) {
  const cell = {
    elevation: interp.elevation,
    minerals: { ...interp.minerals },
    moisture: interp.moisture,
    temperature: interp.temperature,
    volcanism: interp.volcanism,
  };

  // Deterministic noise seed from planetary position
  const noiseSeed = Math.floor(px * 1000 + py * 7);

  // ── 2a. Sub-peak elevation contributions (multi-vent volcanic structure) ──
  for (const peak of regionalSubPeaks) {
    const dx = rx - peak.rx;
    const dy = ry - peak.ry;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < peak.radius * 1.5) {
      // Gaussian falloff from each sub-peak
      const sigma = peak.radius * 0.4;
      const contribution = peak.height * 0.25 * Math.exp(-(dist * dist) / (2 * sigma * sigma));
      cell.elevation += contribution;
    }
  }

  // Multi-scale detail noise
  const fine   = fractalNoise(rx, ry, noiseSeed + 100, 4, 0.025);
  const medium = fractalNoise(rx, ry, noiseSeed + 200, 3, 0.008);
  const micro  = fractalNoise(rx, ry, noiseSeed + 300, 3, 0.06);

  // Amplitude based on elevation context
  const absElev = Math.abs(cell.elevation);

  // ── 2d. Increased coastline noise ──
  // Coastline amplification: highest detail near sea level (wider gaussian)
  const coastFactor = Math.exp(-(absElev * absElev) / (2 * params.coastWidth * params.coastWidth));

  // Mountain amplification: more detail at high elevations
  const mountainFactor = Math.max(0, cell.elevation - 0.1) * 2;

  // Ocean damping: very little noise on deep ocean floor
  const oceanDamp = cell.elevation < -0.1 ? 0.12 : 1.0;

  // Large-scale shape noise (100-200 km coastal deformation features)
  const shapeNoise = fractalNoise(rx, ry, noiseSeed + 700, 2, 0.004);

  // Combined amplitude with increased coastal and shape noise
  const amplitude = oceanDamp * (
    0.02 +
    coastFactor * params.coastAmplitude +
    coastFactor * shapeNoise * params.shapeNoiseAmp +
    mountainFactor * params.mountainDetail
  );

  // Apply elevation detail
  const detailNoise = fine * 0.5 + medium * 0.35 + micro * 0.15;
  cell.elevation += detailNoise * amplitude;

  // ── 2c. Coastal asymmetry (differential wave erosion) ──
  if (coastFactor > 0.3) {
    // A very low-frequency noise determines which "side" of features gets steepened
    const asymmetryAngle = fractalNoise(rx * 0.003, ry * 0.003, noiseSeed + 600, 1, 1.0) * Math.PI;
    const asymmetryX = Math.cos(asymmetryAngle);
    const asymmetryY = Math.sin(asymmetryAngle);

    // Compute local elevation gradient using noise-based approximation
    const gradX = fractalNoise(rx + 1, ry, noiseSeed + 100, 2, 0.025) - fractalNoise(rx - 1, ry, noiseSeed + 100, 2, 0.025);
    const gradY = fractalNoise(rx, ry + 1, noiseSeed + 100, 2, 0.025) - fractalNoise(rx, ry - 1, noiseSeed + 100, 2, 0.025);

    // Dot product: how much does the local slope face the "erosion direction"?
    const exposureDot = gradX * asymmetryX + gradY * asymmetryY;

    // Exposed slopes get steepened, sheltered slopes get smoothed
    cell.elevation += exposureDot * coastFactor * 0.03;
  }

  // Recompute water/land classification at regional resolution
  cell.isLand = cell.elevation > 0.0;
  cell.isShallowWater = cell.elevation > -0.04 && cell.elevation <= 0.0;
  cell.isDeepWater = cell.elevation <= -0.04;
  cell.isFreezing = cell.temperature < 0.5;

  // Add mineral variation (regional mineral pockets)
  const mineralNoise = fractalNoise(rx, ry, noiseSeed + 400, 2, 0.015) * 0.08;
  cell.minerals.iron      = Math.max(0, cell.minerals.iron + mineralNoise);
  cell.minerals.copper    = Math.max(0, cell.minerals.copper + mineralNoise * 0.6);
  cell.minerals.manganese = Math.max(0, cell.minerals.manganese + mineralNoise * 0.8);
  cell.mineralTotal = cell.minerals.iron + cell.minerals.copper + cell.minerals.manganese;
  cell.isDepleted = cell.mineralTotal < 0.15;
  cell.dominant = cell.minerals.iron >= cell.minerals.copper && cell.minerals.iron >= cell.minerals.manganese
    ? 'iron' : cell.minerals.copper >= cell.minerals.manganese ? 'copper' : 'manganese';

  // Add slight moisture variation
  const moistureNoise = fractalNoise(rx, ry, noiseSeed + 500, 2, 0.01) * 0.08;
  cell.moisture = Math.max(0, Math.min(1, cell.moisture + moistureNoise));

  return cell;
}

function computeRegionalCell(rx, ry, centerCX, centerCY) {
  const offsetX = (rx - REGIONAL_SIZE / 2) / CELLS_PER_PLANETARY;
  const offsetY = (ry - REGIONAL_SIZE / 2) / CELLS_PER_PLANETARY;
  const px = centerCX + offsetX;
  const py = centerCY + offsetY;

  const wpx = ((px % W) + W) % W;
  const wpy = Math.max(0, Math.min(H - 0.01, py));

  const interp = bilinearInterpolate(wpx, wpy);
  return addRegionalDetail(interp, rx, ry, wpx, wpy);
}

function computeRegionalFlora(rcells) {
  for (let rx = 0; rx < REGIONAL_SIZE; rx++) {
    for (let ry = 0; ry < REGIONAL_SIZE; ry++) {
      const cell = rcells[rx][ry];
      if (!cell.isLand || cell.isFreezing) {
        cell.floraType = cell.isFreezing ? 'frozen' : 'none';
        cell.floraDensity = 0;
        continue;
      }

      const light = 1.0;
      const photoFitness = light * cell.moisture * 0.8;
      const chemoFitness = cell.mineralTotal * cell.moisture * 1.2;
      const mixoFitness  = (0.6 + 0.5 * cell.mineralTotal) * cell.moisture;
      const maxFitness = Math.max(photoFitness, chemoFitness, mixoFitness);

      if (maxFitness < 0.1) {
        cell.floraType = 'barren';
      } else if (photoFitness >= chemoFitness && photoFitness >= mixoFitness) {
        cell.floraType = 'photosynthetic';
      } else if (chemoFitness >= photoFitness && chemoFitness >= mixoFitness) {
        cell.floraType = 'chemotrophic';
      } else {
        cell.floraType = 'mixotrophic';
      }
      cell.floraDensity = Math.min(1, maxFitness);
    }
  }
}

// ── 2b. Radial drainage erosion ──
function carveRadialDrainage(rcells, seed) {
  // Find local high points (elevation peaks)
  const peaks = [];
  for (let rx = 4; rx < REGIONAL_SIZE - 4; rx += 8) {
    for (let ry = 4; ry < REGIONAL_SIZE - 4; ry += 8) {
      if (rcells[rx][ry].isLand && rcells[rx][ry].elevation > 0.08) {
        // Check if local maximum in 4-cell radius
        let isMax = true;
        for (let dx = -4; dx <= 4; dx += 4) {
          for (let dy = -4; dy <= 4; dy += 4) {
            const nx = rx + dx, ny = ry + dy;
            if (nx >= 0 && nx < REGIONAL_SIZE && ny >= 0 && ny < REGIONAL_SIZE) {
              if (rcells[nx][ny].elevation > rcells[rx][ry].elevation) isMax = false;
            }
          }
        }
        if (isMax) peaks.push({ x: rx, y: ry, elev: rcells[rx][ry].elevation });
      }
    }
  }

  const rng = seededRNG(seed + 9999);

  // From each peak, send 6-12 drainage paths downhill
  for (const peak of peaks) {
    const numPaths = params.drainagePathsMin + Math.floor(rng() * (params.drainagePathsMax - params.drainagePathsMin + 1));

    for (let p = 0; p < numPaths; p++) {
      // Start direction: roughly evenly spaced around the peak + some randomness
      const baseAngle = (p / numPaths) * Math.PI * 2;
      const angle = baseAngle + (rng() - 0.5) * 0.6;  // ±17° wobble

      let cx = peak.x, cy = peak.y;
      let dirX = Math.cos(angle), dirY = Math.sin(angle);

      // Trace downhill, carving a valley
      for (let step = 0; step < 200; step++) {
        cx += dirX;
        cy += dirY;

        const ix = Math.round(cx), iy = Math.round(cy);
        if (ix < 1 || ix >= REGIONAL_SIZE - 1 || iy < 1 || iy >= REGIONAL_SIZE - 1) break;
        if (rcells[ix][iy].elevation <= 0.0) break;  // reached the coast

        // Carve: lower elevation along the path
        // Valley depth proportional to distance from peak (deeper further down)
        const distFromPeak = Math.sqrt((ix - peak.x) ** 2 + (iy - peak.y) ** 2);
        const carveDepth = params.drainageDepth * Math.min(1, distFromPeak / 60);

        // Carve the center of the valley and its immediate neighbors
        for (let dx = -1; dx <= 1; dx++) {
          for (let dy = -1; dy <= 1; dy++) {
            const nx = ix + dx, ny = iy + dy;
            if (nx >= 0 && nx < REGIONAL_SIZE && ny >= 0 && ny < REGIONAL_SIZE) {
              const falloff = (dx === 0 && dy === 0) ? 1.0 : 0.4;  // center deeper than edges
              rcells[nx][ny].elevation -= carveDepth * falloff;
            }
          }
        }

        // Slight direction wobble (streams meander)
        dirX += (rng() - 0.5) * 0.15;
        dirY += (rng() - 0.5) * 0.15;
        // Renormalize direction
        let len = Math.sqrt(dirX * dirX + dirY * dirY);
        dirX /= len; dirY /= len;

        // Bias direction downhill
        if (ix > 0 && ix < REGIONAL_SIZE - 1 && iy > 0 && iy < REGIONAL_SIZE - 1) {
          const gradX = rcells[ix - 1][iy].elevation - rcells[ix + 1][iy].elevation;
          const gradY = rcells[ix][iy - 1].elevation - rcells[ix][iy + 1].elevation;
          dirX += gradX * 0.3;
          dirY += gradY * 0.3;
          const len2 = Math.sqrt(dirX * dirX + dirY * dirY);
          if (len2 > 0) { dirX /= len2; dirY /= len2; }
        }
      }
    }
  }

  // Recompute land/water after carving (some valleys may reach sea level)
  for (let rx = 0; rx < REGIONAL_SIZE; rx++) {
    for (let ry = 0; ry < REGIONAL_SIZE; ry++) {
      const c = rcells[rx][ry];
      c.isLand = c.elevation > 0.0;
      c.isShallowWater = c.elevation > -0.04 && c.elevation <= 0.0;
      c.isDeepWater = c.elevation <= -0.04;
    }
  }
}

function generateRegionalDetail(centerCX, centerCY) {
  if (!cells) return;

  // 1. Precompute sub-peaks for nearby hotspots
  const seed = parseInt(document.getElementById('seedInput').value, 10) || 0;
  regionalSubPeaks = generateSubPeaks(centerCX, centerCY, seed);

  // 2-4. For each cell: bilinear interpolation + sub-peaks + detail noise + asymmetry
  regionalCells = new Array(REGIONAL_SIZE);
  for (let rx = 0; rx < REGIONAL_SIZE; rx++) {
    regionalCells[rx] = new Array(REGIONAL_SIZE);
    for (let ry = 0; ry < REGIONAL_SIZE; ry++) {
      regionalCells[rx][ry] = computeRegionalCell(rx, ry, centerCX, centerCY);
    }
  }

  // 5. Carve radial drainage from peaks
  carveRadialDrainage(regionalCells, seed);

  // 6. Land/water already recomputed in carveRadialDrainage

  // 7. Compute regional flora
  computeRegionalFlora(regionalCells);

  // 8. Render
  renderRegionalMap();
}

function renderRegionalMap() {
  if (!regionalCells) return;

  const scale = 2;
  regionalCanvas.width = REGIONAL_SIZE * scale;
  regionalCanvas.height = REGIONAL_SIZE * scale;

  const colorFn = getColorFn(regionalOverlaySelect.value);
  const imgData = regionalCtx.createImageData(REGIONAL_SIZE * scale, REGIONAL_SIZE * scale);
  const data = imgData.data;

  for (let rx = 0; rx < REGIONAL_SIZE; rx++) {
    for (let ry = 0; ry < REGIONAL_SIZE; ry++) {
      const color = colorFn(regionalCells[rx][ry]);
      for (let dy = 0; dy < scale; dy++) {
        for (let dx = 0; dx < scale; dx++) {
          const off = ((ry * scale + dy) * REGIONAL_SIZE * scale + (rx * scale + dx)) * 4;
          data[off] = color.r;
          data[off + 1] = color.g;
          data[off + 2] = color.b;
          data[off + 3] = 255;
        }
      }
    }
  }

  regionalCtx.putImageData(imgData, 0, 0);
}

function showRegionalView(cx, cy) {
  selectedRegion = { cx, cy };

  regionLabel.textContent = `REGION: (${Math.round(cx)}, ${Math.round(cy)}) — ${band}, ${plateType}`;

  regionalPlaceholder.style.display = 'none';

  statusText.textContent = `Regional detail generated in ${(t1 - t0).toFixed(0)} ms (${REGIONAL_SIZE}×${REGIONAL_SIZE} cells)`;

  render(overlaySelect.value);
  if (currentView === 'globe') renderGlobe();

}

// Draw selection marker on flat map after rendering
function drawSelectionMarker() {
  if (!selectedRegion) return;

  const cx = selectedRegion.cx;
  const cy = selectedRegion.cy;

  // Compute the rectangular extent of the region on the planetary map
  const halfSpan = (REGIONAL_SIZE / 2) / CELLS_PER_PLANETARY;
  const x0 = (cx - halfSpan) * 2;
  const y0 = (cy - halfSpan) * 2;
  const regionW = (REGIONAL_SIZE / CELLS_PER_PLANETARY) * 2;
  const regionH = regionW;

  const pctx = ctx;
  pctx.strokeStyle = '#fff';
  pctx.lineWidth = 1.5;
  pctx.setLineDash([4, 3]);
  pctx.strokeRect(x0, y0, regionW, regionH);
  pctx.setLineDash([]);

  // Small crosshair at center
  const px = cx * 2, py = cy * 2;
  pctx.strokeStyle = '#fff';
  pctx.lineWidth = 1;
  pctx.beginPath();
  pctx.moveTo(px - 4, py); pctx.lineTo(px + 4, py);
  pctx.moveTo(px, py - 4); pctx.lineTo(px, py + 4);
  pctx.stroke();
}

let activePreset = null;
let regenTimer = null;

function showTuneToast(msg) {
  const toast = document.getElementById('tuneToast');
  toast.textContent = msg;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 1800);
}

function updateSliderValues() {
  const panel = document.getElementById('tuningPanel');
  panel.querySelectorAll('input[type="range"]').forEach(slider => {
    const key = slider.dataset.param;
    if (key && params[key] !== undefined) {
      slider.value = params[key];
      slider.nextElementSibling.textContent = formatParamValue(params[key], paramConfig[key]);
    }
  });
}

function formatParamValue(val, config) {
  if (!config) return val;
  if (config.step >= 1) return Math.round(val);
  if (config.step >= 0.01) return val.toFixed(2);
  return val.toFixed(3);
}

function highlightActivePreset(name) {
  activePreset = name;
  document.querySelectorAll('.tune-presets button').forEach(btn => {
    btn.classList.toggle('preset-active', btn.dataset.preset === name);
  });
}

function applyPreset(name) {
  const preset = presets[name];
  if (!preset) return;
  // Reset to defaults first
  Object.assign(params, defaultParams);
  // Apply preset overrides
  Object.assign(params, preset);
  updateSliderValues();
  highlightActivePreset(name);
  scheduleRegen();
}

function scheduleRegen() {
  if (regenTimer) clearTimeout(regenTimer);
  regenTimer = setTimeout(() => {
    runGeneration(true);  // preserve regional view on slider changes
    regenTimer = null;
  }, 150);
}

function saveConfig() {
  const config = {
    seed: parseInt(document.getElementById('seedInput').value, 10) || 0,
    params: { ...params },
    version: 1,
  };
  const json = JSON.stringify(config, null, 2);

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(json).then(() => {
      showTuneToast('Config copied to clipboard');
    }).catch(() => {
      prompt('Copy this config:', json);
    });
  } else {
    prompt('Copy this config:', json);
  }
}

function loadConfig() {
  const json = prompt('Paste config JSON:');
  if (!json) return;
  try {
    const config = JSON.parse(json);
    if (config.params) Object.assign(params, config.params);
    if (config.seed !== undefined) {
      document.getElementById('seedInput').value = config.seed;
    }
    updateSliderValues();
    highlightActivePreset(null);
    runGeneration();
    showTuneToast('Config loaded');
  } catch (e) {
    alert('Invalid config JSON');
  }
}

function buildTuningPanel() {
  const panel = document.getElementById('tuningPanel');
  const groups = {};

  for (const [key, config] of Object.entries(paramConfig)) {
    if (!groups[config.group]) groups[config.group] = [];
    groups[config.group].push({ key, config });
  }

  // Presets row
  const presetDiv = document.createElement('div');
  presetDiv.className = 'tune-presets';
  for (const name of Object.keys(presets)) {
    const btn = document.createElement('button');
    btn.textContent = name;
    btn.dataset.preset = name;
    btn.addEventListener('click', () => applyPreset(name));
    presetDiv.appendChild(btn);
  }
  panel.appendChild(presetDiv);

  // Slider groups
  for (const [groupName, items] of Object.entries(groups)) {
    const section = document.createElement('div');
    const label = document.createElement('div');
    label.className = 'tune-group-label';
    label.textContent = '── ' + groupName + ' ──';
    section.appendChild(label);

    for (const { key, config } of items) {
      const row = document.createElement('div');
      row.className = 'tune-row';

      const lbl = document.createElement('label');
      lbl.textContent = config.label;

      const slider = document.createElement('input');
      slider.type = 'range';
      slider.min = config.min;
      slider.max = config.max;
      slider.step = config.step;
      slider.value = params[key];
      slider.dataset.param = key;

      const valSpan = document.createElement('span');
      valSpan.className = 'tune-value';
      valSpan.textContent = formatParamValue(params[key], config);

      row.appendChild(lbl);
      row.appendChild(slider);
      row.appendChild(valSpan);
      section.appendChild(row);
    }

    panel.appendChild(section);
  }

  // Actions row
  const actionsDiv = document.createElement('div');
  actionsDiv.className = 'tune-actions';

  const saveBtn = document.createElement('button');
  saveBtn.textContent = '💾 Save Config';
  saveBtn.addEventListener('click', saveConfig);

  const loadBtn = document.createElement('button');
  loadBtn.textContent = '📂 Load Config';
  loadBtn.addEventListener('click', loadConfig);

  const resetBtn = document.createElement('button');
  resetBtn.textContent = '↺ Reset';
  resetBtn.addEventListener('click', () => applyPreset('Default'));

  actionsDiv.appendChild(saveBtn);
  actionsDiv.appendChild(loadBtn);
  actionsDiv.appendChild(resetBtn);
  panel.appendChild(actionsDiv);

  // Slider input handler
  panel.addEventListener('input', e => {
    if (e.target.dataset.param) {
      const key = e.target.dataset.param;
      const val = parseFloat(e.target.value);
      params[key] = val;
      e.target.nextElementSibling.textContent = formatParamValue(val, paramConfig[key]);
      highlightActivePreset(null);
      scheduleRegen();
    }
  });
}

function runGeneration(preserveRegion) {
  const seed = parseInt(seedInput.value, 10) || 0;
  statusText.textContent = 'Generating…';
  const savedRegion = preserveRegion && selectedRegion ? { ...selectedRegion } : null;

  // Use setTimeout to allow status text to paint before the blocking generation
  setTimeout(() => {
    const t0 = performance.now();
    generatePlanet(seed);
    const t1 = performance.now();
    render(overlaySelect.value);
    const t2 = performance.now();

    if (currentView === 'globe') {
      renderGlobe();
      const t3 = performance.now();
      statusText.textContent = `Generated in ${(t1 - t0).toFixed(0)} ms · Rendered in ${(t2 - t1).toFixed(0)} ms · Globe in ${(t3 - t2).toFixed(0)} ms`;
    } else if (currentView === 'mollweide') {
      renderMollweide();
      const t3 = performance.now();
      statusText.textContent = `Generated in ${(t1 - t0).toFixed(0)} ms · Rendered in ${(t2 - t1).toFixed(0)} ms · Mollweide in ${(t3 - t2).toFixed(0)} ms`;
    } else {
      statusText.textContent = `Generated in ${(t1 - t0).toFixed(0)} ms · Rendered in ${(t2 - t1).toFixed(0)} ms`;
    }
    hideTooltip();

    if (savedRegion) {
      // Regenerate regional view with new params
      showRegionalView(savedRegion.cx, savedRegion.cy);
    } else {
      closeRegionalView();
    }
  }, 10);
}

genBtn.addEventListener('click', () => runGeneration());

seedInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') runGeneration();
});

overlaySelect.addEventListener('change', () => {
  render(overlaySelect.value);
  if (currentView === 'globe') renderGlobe();
  if (currentView === 'mollweide') renderMollweide();
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top) * scaleY;
  const cellX = Math.floor(px / 2);
  const cellY = Math.floor(py / 2);
  if (cellX >= 0 && cellX < W && cellY >= 0 && cellY < H) {
    showCellInfo(cellX, cellY, e);
    showRegionalView(cellX, cellY);
  }
});

// Generate on load
runGeneration();
</script>

</body>
</html>
